<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - AK Sounds</title>
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/feedback.css">
</head>
<body>

    <!-- GLOBAL NAVIGATION -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html">Home</a>
            <a href="faq.html">FAQ</a>
        </div>
        <div class="nav-right">
            <span id="user-greeting" class="hidden" style="display:flex; align-items:center; font-weight:600; margin-right:15px;"></span>
            <a href="login.html" id="login-link">Login</a>
            <a href="register.html" id="register-link">Register</a>
            <a href="logout.html" id="logout-link" class="hidden">Logout</a>
        </div>
    </nav>

    <div class="page-container">
        <h1>Leave Feedback</h1>
        <p class="subtitle">Help us improve AK Sounds by sharing your experience.</p>

        <form action="#" method="POST" id="feedback-form">
            
            <div class="form-group">
                <label for="name">Name (Optional)</label>
                <input type="text" id="name" name="name" placeholder="Producer Name">
            </div>

            <div class="form-group">
                <label for="email">Email Address (Optional)</label>
                <input type="email" id="email" name="email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="satisfaction">How much are you enjoying the web app?</label>
                <select id="satisfaction" name="satisfaction" required>
                    <option value="" disabled selected>Select an option...</option>
                    <option value="loved_it">Loved it, it's great!</option>
                    <option value="good">It's good, but has room to grow.</option>
                    <option value="neutral">Neutral.</option>
                    <option value="needs_work">Needs a lot of work.</option>
                </select>
            </div>

            <div class="form-group">
                <label for="likes">What do you like most about AK Sounds?</label>
                <textarea id="likes" name="likes" placeholder="Is it the layout, the quality of loops, the ease of downloading?"></textarea>
            </div>

            <div class="form-group">
                <label for="problems">Did you face any bugs or problems?</label>
                <textarea id="problems" name="problems" placeholder="Let us know if downloads failed, buttons didn't work, etc."></textarea>
            </div>

            <div class="form-group">
                <label for="suggestions">Suggestions for improvement?</label>
                <textarea id="suggestions" name="suggestions" placeholder="What features or sound genres would you like to see next?"></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Feedback</button>
        </form>
    </div>

    <script src="js/general.js"></script>
    <script>
        // Optional: Simple JS to prevent default form submission to test UI
        document.getElementById('feedback-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you! Your feedback has been submitted successfully.');
            this.reset();
        });
    </script>
</body>
</html>
