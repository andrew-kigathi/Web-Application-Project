<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AK SOUNDS</title>
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/authorize.css">
</head>
<body>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html">Home</a>
            <a href="faq.html">FAQs</a>
            <a href="feedback.html">Feedback</a>
        </div>
        <div class="nav-right">
            <span id="user-greeting" class="user-greeting hidden"></span>
            <a href="login.html" id="login-link">Login</a>
            <a href="register.html" id="register-link">Register</a>
            <a href="logout.html" id="logout-link" class="hidden">Logout</a>
        </div>
    </nav>

    <!-- Register Form Container -->
    <div class="form-wrapper">
        <div class="form-card">
            <h2>Create an Account</h2>
            <!-- THE FIX IS HERE: Added id="register-form" -->
            <form id="register-form">
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <button type="submit" class="submit-btn">Sign Up</button>
                
                <div class="form-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Links to your external JavaScript file -->
    <script src="js/authorize.js"></script>
</body>
</html>
