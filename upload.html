<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Sounds - AK Sounds</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/upload.css">
</head>
<body style="background-color: #0a0a0a; color: #fff; padding-top: 80px;">

    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html">Home</a>
            <a href="faq.html">FAQ</a>
            <a href="feedback.html">Feedback</a>
        </div>
    </nav>

    <main class="container my-5" style="max-width: 800px;">
        <header class="text-center mb-5">
            <h1 style="color: #b542ff;">Share Your Sound</h1>
            <p class="text-secondary">Upload your sounds to the library. Only .WAV and .MP3 files are supported.</p>
        </header>

        <form id="upload-form" class="upload-container p-4 p-md-5 rounded">
            
            <div id="drop-zone" class="drop-zone mb-4 text-center p-5 rounded">
                <div class="mb-3">
                    <span style="font-size: 3rem;">📁</span>
                </div>
                <h4 class="mb-2">Drag & Drop your audio file here</h4>
                <p class="text-secondary mb-4">or</p>
                <input type="file" id="file-input" accept=".mp3, .wav" hidden>
                <button type="button" id="browse-btn" class="btn custom-btn">Browse Files</button>
                
                <div id="file-display" class="mt-3 text-success fw-bold" style="display: none;"></div>
                <div id="file-error" class="mt-3 text-danger fw-bold" style="display: none;"></div>
            </div>

            <div class="row g-3">
                <div class="col-md-12">
                    <label for="track-title" class="form-label">Track Title</label>
                    <input type="text" class="form-control custom-input" id="track-title" placeholder="e.g. Dark Trap Bells" required>
                </div>
                
                <div class="col-md-6">
                    <label for="track-bpm" class="form-label">BPM</label>
                    <input type="number" class="form-control custom-input" id="track-bpm" placeholder="e.g. 140" required>
                </div>

                <div class="col-md-6">
                    <label for="track-key" class="form-label">Key</label>
                    <input type="text" class="form-control custom-input" id="track-key" placeholder="e.g. C# minor" required>
                </div>

                <div class="col-md-12">
                    <label for="track-category" class="form-label">Category</label>
                    <select class="form-select custom-input" id="track-category" required>
                        <option value="" selected disabled>Select a category...</option>
                        <option value="rap">Rap Melodies</option>
                        <option value="oldschool">Old School Melodies</option>
                        <option value="guitar">Guitar Melodies</option>
                        <option value="rage">Rage Melodies</option>
                        <option value="ethereal">Ethereal Melodies</option>
                        <option value="chill">Chill Melodies</option>
                    </select>
                </div>
            </div>

            <hr class="border-secondary my-4">

            <button type="submit" class="btn custom-btn w-100 py-3 fw-bold fs-5" id="submit-btn" disabled>Upload Track</button>
        </form>
    </main>

    <script src="js/upload.js"></script>
</body>
</html>
